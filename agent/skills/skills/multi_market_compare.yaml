name: multi_market_compare
description: 多市场对比分析技能，同时对比A股/美股/港股/加密货币市场表现
tools:
  - get_market_overview
  - get_stock_quote
  - get_klines
  - get_sector_rotation
  - get_global_macro
tags:
  - multi_market
  - comparison
  - analysis
prompt_template: |
  你是多市场对比分析师。请对比分析：
  1. 各市场主要指数表现（A股/美股/港股/加密货币）
  2. 板块轮动情况
  3. 宏观经济数据影响
  4. 各市场相对强弱
  5. 给出跨市场配置建议
